<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#16a34a">
    <title>KANGAL — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #09090b;
            color: #fafafa;
            padding: 24px;
            text-align: center;
        }

        .container {
            max-width: 380px;
            width: 100%;
        }

        .icon-wrapper {
            width: 96px;
            height: 96px;
            border-radius: 24px;
            background: rgba(22, 163, 74, 0.1);
            border: 1px solid rgba(22, 163, 74, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: pulse 2s ease-in-out infinite;
        }

        .icon-wrapper span {
            font-size: 48px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        h1 .brand {
            color: #16a34a;
        }

        .subtitle {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #a1a1aa;
        }

        .description {
            font-size: 14px;
            color: #71717a;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 50px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 32px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .retry-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #16a34a;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .retry-btn:active {
            transform: scale(0.97);
            background: #15803d;
        }

        .food-strip {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 40px;
            opacity: 0.3;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <span>🐐</span>
        </div>

        <h1><span class="brand">KANGAL</span></h1>
        <p class="subtitle">ইন্টারনেট নেই! 📡</p>
        <p class="description">
            আপনি এখন অফলাইনে আছেন। ইন্টারনেট সংযোগ ফিরে এলে আবার চেষ্টা করুন।
        </p>

        <div class="status-pill">
            <div class="status-dot"></div>
            No internet connection
        </div>

        <br><br>

        <button class="retry-btn" onclick="window.location.reload()">
            🔄 আবার চেষ্টা করুন
        </button>

        <div class="food-strip">
            <span>🍚</span>
            <span>🥘</span>
            <span>🍛</span>
            <span>🥗</span>
            <span>🍲</span>
        </div>
    </div>

    <script>
        // Auto-refresh when connection returns
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
