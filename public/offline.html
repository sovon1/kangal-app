<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#09090b">
    <title>KANGAL — No Internet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #09090b;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            padding-top: env(safe-area-inset-top, 24px);
        }

        .container {
            text-align: center;
            max-width: 360px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.2;
            }

            100% {
                transform: scale(0.8);
                opacity: 0.6;
            }
        }

        .icon-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 32px;
            animation: float 4s ease-in-out infinite;
        }

        .pulse-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(22, 163, 74, 0.3);
            animation: pulse-ring 2s ease-in-out infinite;
        }

        .icon-circle {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, rgba(22, 163, 74, 0.15), rgba(22, 163, 74, 0.05));
            border: 1px solid rgba(22, 163, 74, 0.2);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wifi-icon {
            width: 56px;
            height: 56px;
            color: #16a34a;
            opacity: 0.8;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #a1a1aa;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .subtitle-bn {
            font-size: 15px;
            color: #71717a;
            margin-bottom: 8px;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 24px rgba(22, 163, 74, 0.3);
        }

        .retry-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 12px rgba(22, 163, 74, 0.2);
        }

        .retry-icon {
            width: 18px;
            height: 18px;
        }

        .brand {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: #3f3f46;
            font-weight: 500;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon-wrapper">
            <div class="pulse-ring"></div>
            <div class="icon-circle">
                <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
                    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
                    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
                    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                    <line x1="12" y1="20" x2="12.01" y2="20"></line>
                </svg>
            </div>
        </div>

        <p class="subtitle-bn">ইন্টারনেট সংযোগ নেই</p>
        <h1>No Internet Connection</h1>
        <p class="subtitle">
            Please check your Wi-Fi or mobile data connection and try again.
        </p>

        <button class="retry-btn" onclick="location.reload()">
            <svg class="retry-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            Try Again
        </button>
    </div>

    <div class="brand">KANGAL</div>
</body>

</html>
