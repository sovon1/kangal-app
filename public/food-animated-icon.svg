<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><defs><style>@keyframes float-steam{0%{transform:translateY(10px);opacity:0}50%{transform:translateY(-15px) translateX(5px);opacity:.8}}@keyframes bob{0%{transform:translateY(0) scale(1)}50%{transform:translateY(5px) scale(.98)}}@keyframes eat{0%{transform:rotate(0deg) translateY(0)}50%{transform:rotate(-15deg) translateY(10px) translateX(-5px)}}@keyframes pulse{0%{fill-opacity:.1;transform:scale(1)}50%{fill-opacity:.15;transform:scale(1.05)}}.steam{stroke-dasharray:20;animation:float-steam 3s ease-in-out infinite;opacity:0}.steam-2,.steam-3{stroke-dasharray:25;animation:float-steam 3.5s ease-in-out infinite 1s;opacity:0}.steam-3{stroke-dasharray:15;animation:float-steam 2.5s ease-in-out infinite .5s}.bowl{transform-origin:center;animation:bob 3s ease-in-out infinite}.chopsticks{transform-origin:140px 60px;animation:eat 3s ease-in-out infinite}.glow{animation:pulse 3s infinite}</style></defs><circle cx="100" cy="120" r="75" fill="#10b981" class="glow bowl"/><g fill="none" stroke="#94a3b8" stroke-linecap="round" stroke-width="5"><path d="M 70 80 Q 80 60 70 40" class="steam"/><path d="M 100 70 Q 110 40 100 20" class="steam-2"/><path d="M 130 80 Q 120 60 130 40" class="steam-3"/></g><g class="chopsticks"><line x1="80" x2="160" y1="50" y2="10" stroke="#f59e0b" stroke-linecap="round" stroke-width="6"/><line x1="90" x2="170" y1="45" y2="5" stroke="#f59e0b" stroke-linecap="round" stroke-width="6"/></g><g class="bowl"><path fill="#fff" stroke="#e2e8f0" stroke-linejoin="round" stroke-width="4" d="M 40 100 C 40 50, 160 50, 160 100 Z"/><ellipse cx="100" cy="100" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="70" ry="15"/><path fill="#10b981" stroke="#059669" stroke-linejoin="round" stroke-width="4" d="M 30 100 C 30 170, 70 180, 100 180 C 130 180, 170 170, 170 100 Z"/><path fill="none" stroke="#34d399" stroke-linecap="round" stroke-width="4" d="M 40 120 Q 70 140 100 120 Q 130 140 160 120" opacity=".6"/><path fill="none" stroke="#34d399" stroke-linecap="round" stroke-width="4" d="M 50 145 Q 75 160 100 145 Q 125 160 150 145" opacity=".6"/><g transform="translate(0, 15)"><ellipse cx="70" cy="125" fill="#047857" opacity=".3" rx="8" ry="4"/><ellipse cx="130" cy="125" fill="#047857" opacity=".3" rx="8" ry="4"/><circle cx="80" cy="120" r="6" fill="#022c22"/><circle cx="120" cy="120" r="6" fill="#022c22"/><circle cx="78" cy="118" r="2.5" fill="#fff"/><circle cx="118" cy="118" r="2.5" fill="#fff"/><path fill="#022c22" stroke="#022c22" stroke-linejoin="round" stroke-width="2" d="M 94 125 Q 100 135 106 125 Z"/><path fill="#ef4444" d="M 97 128 Q 100 132 103 128 Z"/></g><path fill="#059669" stroke="#047857" stroke-linejoin="round" stroke-width="4" d="M 65 180 L 68 195 Q 100 200 132 195 L 135 180"/></g></svg>