<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      .steam {
        stroke-dasharray: 20;
        animation: float-steam 3s ease-in-out infinite;
        opacity: 0;
      }
      .steam-2 {
        stroke-dasharray: 25;
        animation: float-steam 3.5s ease-in-out infinite 1s;
        opacity: 0;
      }
      .steam-3 {
        stroke-dasharray: 15;
        animation: float-steam 2.5s ease-in-out infinite 0.5s;
        opacity: 0;
      }
      .bowl {
        transform-origin: center;
        animation: bob 3s ease-in-out infinite;
      }
      .chopsticks {
        transform-origin: 140px 60px;
        animation: eat 3s ease-in-out infinite;
      }
      
      @keyframes float-steam {
        0% { transform: translateY(10px); opacity: 0; }
        50% { transform: translateY(-15px) translateX(5px); opacity: 0.8; }
        100% { transform: translateY(-30px) translateX(-5px); opacity: 0; }
      }
      @keyframes bob {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(5px) scale(0.98); }
      }
      @keyframes eat {
        0%, 100% { transform: rotate(0deg) translateY(0); }
        50% { transform: rotate(-15deg) translateY(10px) translateX(-5px); }
      }
      .glow {
        animation: pulse 3s infinite;
      }
      @keyframes pulse {
        0%, 100% { fill-opacity: 0.1; transform: scale(1); }
        50% { fill-opacity: 0.15; transform: scale(1.05); }
      }
    </style>
  </defs>

  <!-- Glowing background aura -->
  <circle cx="100" cy="120" r="75" fill="#10b981" class="glow bowl" />

  <g stroke-linecap="round" stroke-width="5" stroke="#94a3b8" fill="none">
    <!-- Steam lines -->
    <path d="M 70 80 Q 80 60 70 40" class="steam" />
    <path d="M 100 70 Q 110 40 100 20" class="steam-2" />
    <path d="M 130 80 Q 120 60 130 40" class="steam-3" />
  </g>

  <!-- Chopsticks -->
  <g class="chopsticks">
    <line x1="80" y1="50" x2="160" y2="10" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" />
    <line x1="90" y1="45" x2="170" y2="5" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" />
  </g>

  <g class="bowl">
    <!-- Rice mound -->
    <path d="M 40 100 C 40 50, 160 50, 160 100 Z" fill="#ffffff" stroke="#e2e8f0" stroke-width="4" stroke-linejoin="round" />
    
    <!-- Bowl top rim inner -->
    <ellipse cx="100" cy="100" rx="70" ry="15" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
    
    <!-- Bowl Base -->
    <path d="M 30 100 C 30 170, 70 180, 100 180 C 130 180, 170 170, 170 100 Z" fill="#10b981" stroke="#059669" stroke-width="4" stroke-linejoin="round" />
    
    <!-- Decorative Bowl Pattern -->
    <path d="M 40 120 Q 70 140 100 120 Q 130 140 160 120" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    <path d="M 50 145 Q 75 160 100 145 Q 125 160 150 145" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round" opacity="0.6" />

    <!-- Cute Bowl Face -->
    <g transform="translate(0, 15)">
      <!-- Cheeks -->
      <ellipse cx="70" cy="125" rx="8" ry="4" fill="#047857" opacity="0.3" />
      <ellipse cx="130" cy="125" rx="8" ry="4" fill="#047857" opacity="0.3" />
      
      <!-- Anime Eyes -->
      <circle cx="80" cy="120" r="6" fill="#022c22" />
      <circle cx="120" cy="120" r="6" fill="#022c22" />
      <circle cx="78" cy="118" r="2.5" fill="#ffffff" />
      <circle cx="118" cy="118" r="2.5" fill="#ffffff" />
      
      <!-- Cute open smile -->
      <path d="M 94 125 Q 100 135 106 125 Z" fill="#022c22" stroke="#022c22" stroke-width="2" stroke-linejoin="round" />
      <!-- Tongue sticking out -->
      <path d="M 97 128 Q 100 132 103 128 Z" fill="#ef4444" />
    </g>
    
    <!-- Bowl foot -->
    <path d="M 65 180 L 68 195 Q 100 200 132 195 L 135 180" fill="#059669" stroke="#047857" stroke-width="4" stroke-linejoin="round" />
  </g>
</svg>
