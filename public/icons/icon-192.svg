<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="192" height="192" rx="40" fill="url(#shine)"/>
  <!-- Plate/bowl -->
  <ellipse cx="96" cy="130" rx="48" ry="14" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="96" cy="126" rx="42" ry="12" fill="rgba(255,255,255,0.3)"/>
  <!-- Fork and knife icon -->
  <g transform="translate(96,78)" fill="white">
    <!-- Fork -->
    <g transform="translate(-20,0)">
      <rect x="-2" y="-24" width="4" height="48" rx="2"/>
      <rect x="-8" y="-24" width="4" height="16" rx="2"/>
      <rect x="4" y="-24" width="4" height="16" rx="2"/>
    </g>
    <!-- Knife -->
    <g transform="translate(20,0)">
      <rect x="-2" y="-24" width="4" height="48" rx="2"/>
      <path d="M2,-24 Q10,-20 10,-8 Q10,0 2,0 Z" fill="rgba(255,255,255,0.9)"/>
    </g>
  </g>
  <!-- Steam lines -->
  <g fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round">
    <path d="M80,40 Q78,32 82,24"/>
    <path d="M96,36 Q94,28 98,20"/>
    <path d="M112,40 Q110,32 114,24"/>
  </g>
  <!-- KANGAL text -->
  <text x="96" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="22" fill="white" letter-spacing="3" opacity="0.95">KANGAL</text>
</svg>
